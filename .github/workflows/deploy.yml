name: Deploy

on:
  workflow_run:
    workflows: ["Tests Runner"]
    types: [completed]

jobs:
  deploy:
    name: Deploy to production
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      CI_KAMAL_REGISTRY_PASSWORD: ${{ secrets.CI_KAMAL_REGISTRY_PASSWORD }}
      CI_AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
      CI_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
      CI_DJSTRIPE_WEBHOOK_SECRET: ${{ secrets.CI_DJSTRIPE_WEBHOOK_SECRET }}
      CI_HASHID_FIELD_SALT: ${{ secrets.CI_HASHID_FIELD_SALT }}
      CI_ROLLBAR_ACCESS_TOKEN: ${{ secrets.CI_ROLLBAR_ACCESS_TOKEN }}
      CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
      CI_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      CI_SENTRY_DSN: ${{ secrets.CI_SENTRY_DSN }}
      CI_STRIPE_LIVE_PUBLISHABLE_KEY: ${{ secrets.CI_STRIPE_LIVE_PUBLISHABLE_KEY }}
      CI_STRIPE_LIVE_SECRET_KEY: ${{ secrets.CI_STRIPE_LIVE_SECRET_KEY }}
      CI_STRIPE_TEST_PUBLISHABLE_KEY: ${{ secrets.CI_STRIPE_TEST_PUBLISHABLE_KEY }}
      CI_STRIPE_TEST_SECRET_KEY: ${{ secrets.CI_STRIPE_TEST_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal --no-document

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Add server host key
        run: mkdir -p ~/.ssh && ssh-keyscan -H 174.138.127.127 >> ~/.ssh/known_hosts

      - name: Deploy with Kamal
        run: kamal deploy --version "${{ github.event.workflow_run.head_sha }}" --skip-push
