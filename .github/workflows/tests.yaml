name: Tests Runner
on:
  - push

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-24.04
    env:
      ALLOWED_HOSTS: '*'
      AWS_ACCESS_KEY_ID: 'a secret to everybody'
      AWS_SECRET_ACCESS_KEY: 'a secret to everybody'
      DJSTRIPE_WEBHOOK_SECRET: 'whsec_asecrettoeverybody'
      DJSTRIPE_WEBHOOK_VALIDATION: ''
      HASHID_FIELD_SALT: 'a secret to everybody'
      IS_SECURE: 'off'
      SECRET_KEY: 'a secret to everybody'
      SENTRY_ENABLED: 'off'
      SENTRY_DSN: 'dsn_example'
      STRIPE_LIVE_MODE: 'off'
      STRIPE_LIVE_SECRET_KEY: 'sk_live_asecrettoeverybody'
      STRIPE_TEST_SECRET_KEY: 'sk_test_asecrettoeverybody'
      STRIPE_TEST_PUBLISHABLE_KEY: 'pk_test_asecrettoeverybody'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --dev

      - name: Fake build the site.css
        run: touch static/site.css

      - name: Check types
        run: make mypy

      - name: Test it
        run: make coverage

      - name: Check deploy configuration
        run: uv run manage.py check --deploy --fail-level WARNING
        env:
          DATABASE_URL: 'sqlite://:memory:'
          SECRET_KEY: 'zt(6jlr#oquxm2t%ryh#n+-72p^(3knbf&q$5x16#o%1im-s7!'

      - name: Check documentation build
        run: make docs

  docker-build:
    name: Build Docker image with Kamal
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      CI_KAMAL_REGISTRY_PASSWORD: ${{ secrets.CI_KAMAL_REGISTRY_PASSWORD }}
      CI_AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
      CI_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
      CI_DJSTRIPE_WEBHOOK_SECRET: ${{ secrets.CI_DJSTRIPE_WEBHOOK_SECRET }}
      CI_HASHID_FIELD_SALT: ${{ secrets.CI_HASHID_FIELD_SALT }}
      CI_ROLLBAR_ACCESS_TOKEN: ${{ secrets.CI_ROLLBAR_ACCESS_TOKEN }}
      CI_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      CI_SENTRY_DSN: ${{ secrets.CI_SENTRY_DSN }}
      CI_STRIPE_LIVE_PUBLISHABLE_KEY: ${{ secrets.CI_STRIPE_LIVE_PUBLISHABLE_KEY }}
      CI_STRIPE_LIVE_SECRET_KEY: ${{ secrets.CI_STRIPE_LIVE_SECRET_KEY }}
      CI_STRIPE_TEST_PUBLISHABLE_KEY: ${{ secrets.CI_STRIPE_TEST_PUBLISHABLE_KEY }}
      CI_STRIPE_TEST_SECRET_KEY: ${{ secrets.CI_STRIPE_TEST_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal --no-document

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image with Kamal
        run: kamal build push --version "${{ github.sha }}"

  e2e:
    name: Run E2E tests against built image
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    env:
      CI_KAMAL_REGISTRY_PASSWORD: ${{ secrets.CI_KAMAL_REGISTRY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser dependencies
        run: npm --prefix frontend run e2e:install:ci

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mblayman
          password: ${{ secrets.CI_KAMAL_REGISTRY_PASSWORD }}

      - name: Run E2E against built image
        run: bin/e2e-docker "mblayman/homeschool:${{ github.sha }}"
